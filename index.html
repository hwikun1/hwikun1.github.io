<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易搜索网站</title>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;}
        body{
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f5f7fa;
        }
        .search-box{
            width: 90%;
            max-width: 550px;
        }
        h2{
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .search-input{
            width: 100%;
            height: 48px;
            padding: 0 18px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .search-input:focus{
            border-color: #409eff;
            box-shadow: 0 0 8px rgba(64,158,255,0.3);
        }
        .btn-group{
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }
        button{
            padding: 10px 26px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-btn{
            background: #409eff;
            color: white;
        }
        .search-btn:hover{
            background: #337ecc;
        }
        .empty-btn{
            background: #eee;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="search-box">
        <h2>全网搜索</h2>
        <input type="text" class="search-input" placeholder="输入关键词搜索..." id="searchVal">
        <div class="btn-group">
            <button class="search-btn" onclick="search()">立即搜索</button>
            <button class="empty-btn" onclick="clearInput()">清空内容</button>
        </div>
    </div>

    <script>
        // 调用浏览器默认搜索引擎搜索
        function search(){
            let val = document.getElementById('searchVal').value.trim();
            if(val){
                window.open(`https://www.baidu.com/s?wd=${val}`);
            }else{
                alert('请输入搜索内容');
            }
        }
        // 清空输入框
        function clearInput(){
            document.getElementById('searchVal').value = '';
        }
        // 回车快捷搜索
        document.getElementById('searchVal').addEventListener('keydown',function(e){
            if(e.key === 'Enter') search();
        })
    </script>
</body>
</html>
